<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Landing Page de Podcast</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: #fff; text-align: center; padding: 50px; }
        .video-container { max-width: 640px; margin: 0 auto; }
        iframe { border: none; width: 100%; height: 400px; }
    </style>
</head>
<body>
    <h1>Escucha mis Podcast en YouTube</h1>
    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
        <p>Reemplaza "YOUR_VIDEO_ID" con el ID de tu video de YouTube.</p>
    </div>
</body>
</html>
