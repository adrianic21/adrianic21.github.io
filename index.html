<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geopolítica Diaria</title>
    <style>
        /* Paleta de colores */
        :root {
            --azul-electrico: #007BFF;
            --blanco: #ffffff;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--blanco);
            color: #000;
        }

        header {
            text-align: center;
            padding: 60px 20px 30px 20px;
            background-color: var(--azul-electrico);
            color: var(--blanco);
        }

        header h1 {
            font-size: 3em;
            margin: 0;
        }

        header p {
            font-size: 1.2em;
            margin: 10px 0 0 0;
        }

        .cta {
            margin: 30px 0;
            font-size: 1.5em;
            font-weight: bold;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 20px 0 50px 0;
        }

        .buttons a {
            text-decoration: none;
            color: var(--blanco);
            background-color: var(--azul-electrico);
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }

        .buttons a:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        .social {
            text-align: center;
            margin-bottom: 50px;
        }

        .social a {
            margin: 0 15px;
            display: inline-block;
            color: var(--azul-electrico);
            font-size: 2em;
            transition: transform 0.2s, color 0.2s;
        }

        .social a:hover {
            transform: scale(1.2);
            color: #0056b3;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #f2f2f2;
            color: #555;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 2em;
            }

            .cta {
                font-size: 1.2em;
            }

            .buttons a {
                padding: 12px 25px;
                font-size: 0.9em;
            }
        }
    </style>
    <!-- Íconos de redes sociales -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <h1>Geopolítica Diaria</h1>
        <p>Audioresúmenes de noticias y artículos sobre geopolítica y economía mundial</p>
        <div class="cta">Síguenos y mantente informado</div>
        <div class="buttons">
            <a href="https://open.spotify.com/show/7JNs57kxxvQHnZTztccPoh" target="_blank"><i class="fab fa-spotify"></i> Spotify</a>
            <a href="https://www.youtube.com/@Geopol%C3%ADticaDiariaTV" target="_blank"><i class="fab fa-youtube"></i> YouTube</a>
        </div>
    </header>

    <div class="social">
        <a href="https://www.facebook.com/geopoliticadiaria" target="_blank"><i class="fab fa-facebook-square"></i></a>
        <a href="https://www.instagram.com/geopoliticadiaria/" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@geopoliticadiariatv" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>

    <footer>
        &copy; 2026 Geopolítica Diaria. Todos los derechos reservados.
    </footer>
</body>
</html>
